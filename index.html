<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>サポごはんマップ</title>

  <style>
    body {
      margin: 0;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    .map-button {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 9999;
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    .map-button button {
      font-size: 16px;
      padding: 8px 12px;
    }
  </style>
</head>

<body>

<div class="map-button">
  <button onclick="moveToCurrentLocation()">
    現在地
  </button>
</div>

<div id="map"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>

  // =========================
  // Firebase設定
  // =========================

  const firebaseConfig = {
    apiKey: "AIzaSyCyzwwPiCcUCICxv6kcx7ZlaNkMa46hcVA",
    authDomain: "japan-football-supporters-hub.firebaseapp.com",
    projectId: "japan-football-supporters-hub",
    storageBucket: "japan-football-supporters-hub.firebasestorage.app",
    messagingSenderId: "607581916231",
    appId: "1:607581916231:web:d857fe57f315dea46db562"
  };

  firebase.initializeApp(firebaseConfig);

  const db = firebase.firestore();

  // =========================
  // グローバル変数
  // =========================

  let map;
  let userLocation = null;
  let currentMarker = null;

  // =========================
  // 距離計算
  // =========================

  function getDistance(lat1, lng1, lat2, lng2) {

    const R = 6371;

    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;

    const a =
      Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.cos(lat1 * Math.PI / 180) *
      Math.cos(lat2 * Math.PI / 180) *
      Math.sin(dLng / 2) * Math.sin(dLng / 2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

    return R * c;
  }

  // =========================
  // 現在地取得
  // =========================

  function moveToCurrentLocation() {

    if (!navigator.geolocation) {
      alert("位置情報が使えません");
      return;
    }

    navigator.geolocation.getCurrentPosition(

      function(position) {

        const lat = position.coords.latitude;
        const lng = position.coords.longitude;

        const currentPos = {
          lat: lat,
          lng: lng
        };

        // 保存
        userLocation = currentPos;

        // 地図移動
        map.setCenter(currentPos);
        map.setZoom(16);

        // 既存マーカー削除
        if (currentMarker) {
          currentMarker.setMap(null);
        }

        // 現在地マーカー
        currentMarker = new google.maps.Marker({
          position: currentPos,
          map: map,
          title: "現在地",
          icon: "http://maps.google.com/mapfiles/ms/icons/yellow-dot.png"
        });

        // 店舗再描画
        loadShops();

      },

      function() {
        alert("位置情報の取得に失敗しました");
      }

    );
  }

  // =========================
  // 店舗読み込み
  // =========================

  function loadShops() {

    db.collection("shops").get().then(snapshot => {

      console.log("取得件数:", snapshot.size);

      const bounds = new google.maps.LatLngBounds();

      snapshot.forEach(doc => {

        const shop = doc.data();

        const lat = Number(shop.lat);
        const lng = Number(shop.lng);

        // 不正データ除外
        if (isNaN(lat) || isNaN(lng)) {
          return;
        }

        let distanceText = "";

        // 距離計算
        if (userLocation) {

          const distance = getDistance(
            userLocation.lat,
            userLocation.lng,
            lat,
            lng
          );

          distanceText =
            "距離: " + distance.toFixed(2) + " km<br>";

          // 3km以内のみ表示
          if (distance > 3) {
            return;
          }
        }

        // ピン色
        const iconColor = shop.away
          ? "http://maps.google.com/mapfiles/ms/icons/red-dot.png"
          : "http://maps.google.com/mapfiles/ms/icons/blue-dot.png";

        // マーカー
        const marker = new google.maps.Marker({
          position: {
            lat: lat,
            lng: lng
          },
          map: map,
          title: shop.name,
          icon: iconColor
        });

        bounds.extend(marker.getPosition());

        // GoogleMapリンク
        const googleMapLink =
          "https://www.google.com/maps?q=" +
          lat + "," + lng;

        // 吹き出し
        const infoWindow = new google.maps.InfoWindow({

          content:
            "<strong>" + shop.name + "</strong><br>" +
            "応援クラブ: " + shop.team + "<br>" +
            distanceText +
            "アウェイ歓迎: " +
            (shop.away ? "あり" : "なし") +
            "<br>" +
            (shop.note || "") +
            "<br>" +
            "<a href='" +
            googleMapLink +
            "' target='_blank'>Googleマップで開く</a>"

        });

        // クリックイベント
        marker.addListener("click", () => {
          infoWindow.open(map, marker);
        });

      });

      // 自動ズーム
      if (!snapshot.empty && !userLocation) {

        map.fitBounds(bounds);

        google.maps.event.addListenerOnce(
          map,
          "bounds_changed",
          function () {

            if (map.getZoom() > 14) {
              map.setZoom(14);
            }

          }
        );
      }

    });

  }

  // =========================
  // 初期化
  // =========================

  window.initMap = function () {

    console.log("地図初期化OK");

    map = new google.maps.Map(
      document.getElementById("map"),
      {
        center: {
          lat: 34.7284,
          lng: 135.4814
        },
        zoom: 14
      }
    );

    loadShops();
  };

</script>

<!-- Google Maps -->
<script async
  src="https://maps.googleapis.com/maps/api/js?key=？？？&callback=initMap">
</script>

</body>
</html>
