<head>
  <meta charset="utf-8">

  <!-- スマホ最適化 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>サポごはんマップ</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px; /* スマホで読みやすい基準値 */
      line-height: 1.5;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    /* 現在地ボタン（スマホ向けに大型化） */
    .current-location-btn {
      position: absolute;
      top: 60px;
      left: 10px;
      z-index: 1;

      padding: 12px 18px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      background: #007bff;
      color: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);

      /* タップしやすいサイズ確保 */
      min-width: 80px;
      min-height: 44px;
    }

    .current-location-btn:active {
      background: #0056c7;
    }

    /* InfoWindow の文字もスマホ向けに調整 */
    .gm-style-iw {
      font-size: 15px !important;
      line-height: 1.4 !important;
    }
  </style>
</head>

<body>

  <button class="current-location-btn" onclick="moveToCurrentLocation()">
    現在地
  </button>

  <div id="map"></div>
